name: Test Python functions

on:
  pull_request:
    branches:
      - master
    paths:
      - '**/*.py'
      - '**/*.cpp'
      - '**/*.h'
  workflow_dispatch:

jobs:
  run_unix_tests:
    env:
      UV_SYSTEM_PYTHON: 1

    name: Run Python tests on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        run: |
          sudo apt update
          sudo apt-get install -y clang

      - name: Set environment variables for Clang
        run: |
          export CC=$(which clang)
          export CXX=$(which clang++)
          echo $CC
          echo $CXX
          clang --version 
          clang++ --version

      - name: Get sources
        run: |
          mkdir -p checkout
          chmod +x ./get_sources 
          ./get_sources
        working-directory: ./package

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.9'

      - name: Set up Python
        run: uv python install

      - name: Install NucleoFind
        run: uv pip install . --break-system-packages
        working-directory: ./package

      - name: Install pytest
        run: uv pip install pytest --break-system-packages

      - name: Install NucleoFind models
        run: |
          nucleofind-install -m core
          nucleofind-install -m nano

      - name: Run tests
        run: uv run pytest tests
        working-directory: ./package

  run_windows_tests:
    name: Run Python tests on Windows
    runs-on: windows-latest
    env:
      UV_SYSTEM_PYTHON: 1

    steps:
      - uses: actions/checkout@v4

      - uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64

      - name: Get sources
        run: |
          mkdir checkout
          sh get_sources
        working-directory: ./package

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.9'

      - name: Set up Python
        run: uv python install

      - name: Install NucleoFind
        run: uv pip install . --break-system-packages
        working-directory: ./package

      - name: Install pytest
        run: uv pip install pytest

      - name: Install NucleoFind models
        run: |
          nucleofind-install -m nano
          nucleofind-install -m core

      - name: Run tests
        run: uv run pytest tests --break-system-packages
        working-directory: ./package


  debug:
    needs: [ run_unix_tests, run_windows_tests ]
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    steps:
      - uses: actions/checkout@v3
      - name: Notify chat
        uses: teknatha136/actions-google-chat-text-message@main
        with:
          google-chat-webhook: ${{ secrets.WEBHOOK_URL }}
          text-message: ${{ github.actor }} attempted to merge a change into NucleoFind, but this PR failed testing. Link ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \n